<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Verify</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(135deg,#d7e0d3,#cfd6e3);
}

.card{
  background:#fff;
  padding:35px 30px;
  border-radius:14px;
  width:280px;
  text-align:center;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* circle outline */
.circle{
  width:60px;
  height:60px;
  margin:0 auto 20px auto;
  border-radius:50%;
  border:4px solid #e5e5e5;
  position:relative;
  overflow:hidden;
}

/* bouncing blue shape */
.circle::after{
  content:"";
  position:absolute;
  left:0;
  width:100%;
  height:40%;
  background:#1976d2;
  border-radius:50% 50% 0 0;
  animation:bounce 1.5s infinite ease-in-out;
}

/* bounce animation */
@keyframes bounce{
  0% { bottom:-10%; }
  50% { bottom:40%; }
  100% { bottom:-10%; }
}

.verify{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  font-size:18px;
  margin-bottom:10px;
}

.verify input{
  width:22px;
  height:22px;
  cursor:pointer;
}

.sub{
  font-size:14px;
  color:#666;
  margin-bottom:10px;
}

.links{
  font-size:13px;
}

.links a{
  color:#1a73e8;
  text-decoration:none;
  margin:0 4px;
}

.links a:hover{
  text-decoration:underline;
}
</style>

<script>
function verifyHuman(el){
  if(el.checked){
    setTimeout(function(){
      window.location.href="step2.html";
    },800);
  }
}
</script>

</head>

<body>

<div class="card">

<div class="circle"></div>

<div class="verify">
<label for="check">I'm not a robot</label>
<input type="checkbox" id="check" onclick="verifyHuman(this)">
</div>

<div class="sub">Verify You Are Human</div>

<div class="links">
<a href="#">QuickBook</a> -
<a href="#">Privacy</a> -
<a href="#">Terms</a>
</div>

</div>

</body>
</html>
